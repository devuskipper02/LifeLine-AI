name: lifeline_ai
description: A LifeLine AI Flutter App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  http: ^1.2.1
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0
  google_generative_ai: ^0.4.7
  flutter_local_notifications: ^17.2.2
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true